name: Stealth Signals Morning Bot
on:
  schedule:
    # 6:00 AM PDT = 1:00 PM UTC (daylight saving - March to November)
    # 6:00 AM PST = 2:00 PM UTC (standard time - November to March)
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    # 2:00 PM PDT = 9:00 PM UTC (EOD GEX run - daylight saving)
    # 2:00 PM PST = 10:00 PM UTC (EOD GEX run - standard time)
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  morning_brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pytz
      - name: Run morning bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FLASHALPHA_KEY: ${{ secrets.FLASHALPHA_KEY }}
        run: python stealth_bot.py
      - name: Commit morning brief
        run: |
          git config --global user.name "StealthBot"
          git config --global user.email "bot@stealthsignals.com"
          git add public/morning_brief.json
          git diff --staged --quiet || git commit -m "Morning brief $(date +'%Y-%m-%d %H:%M')"
          git push origin main --force
