name: Stealth Signals Morning Bot

on:
  schedule:
    # 4:00 AM PST = 12:00 PM UTC (standard time)
    # 4:00 AM PDT = 11:00 AM UTC (daylight saving time)
    # Running at both to cover DST transitions
    - cron: '0 11 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  morning_brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run morning bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python stealth_bot.py

      - name: Commit morning brief
        run: |
           git config --global user.name "StealthBot"
          git config --global user.email "bot@stealthsignals.com"
          git fetch origin main
          git reset --hard origin/main
          git add public/morning_brief.json
          git diff --staged --quiet || git commit -m "Morning brief $(date +'%Y-%m-%d')"
          git push origin main
